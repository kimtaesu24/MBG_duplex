PIPELINE: 'vae_trainer.VAETrainer'
WANDB_ENTITY: 'seonghee'
WANDB_PROJECT: 'NIPS_duplex_ARTalk_mimi54'
DUMP_DIR: './outputs'

DATASET:
  NAME: 'MimiFlame54'
  JAW_DIM: 1
  LOADER: 'mimi_flame_data.MimiFlameData'
  CLIP_LENGTH: 100
  PREV_LENGTH: 100
  STYLE_LENGTH: 100
  STRIDE: 50
  MOTION_FPS: 25
  AUDIO_SAMPLE_RATE: 16000
  MIMI_FEATURE_FPS: 12.5
  LENGTH_MISMATCH_CSV: '/home6/duplex/dataset/artalk_mimi54_length_mismatches.csv'
  SOURCES:
    - NAME: 'dualtalk'
      DATA_ROOT: '/home6/duplex/dataset/dualtalk'
      MIMI_ROOT: '/home6/duplex/dataset/mimi_emb'
      SPLITS:
        train: 'train'
        val: 'ood'
        test: 'test'
      MIMI_SPLITS:
        train: 'train'
        val: 'ood'
        test: 'test'
      MIMI_STEM_PREFIX: ''
      LENGTH_TOLERANCE: 2
    - NAME: 'ami_bc'
      DATA_ROOT: '/home6/duplex/dataset/ami_flame/bc'
      MIMI_ROOT: '/home6/duplex/dataset/mimi_emb'
      SPLITS:
        train: 'train'
        val: 'valid'
        test: 'test'
      MIMI_SPLITS:
        train: 'ami_train_bc'
        val: 'ami_val_bc'
        test: 'ami_test_bc'
      MIMI_STEM_PREFIX: ''
      MIMI_STEM_SUFFIX_STRIP: '_bc'
      LENGTH_TOLERANCE: 2
    - NAME: 'ami_ut'
      DATA_ROOT: '/home6/duplex/dataset/ami_flame/ut'
      MIMI_ROOT: '/home6/duplex/dataset/mimi_emb'
      SPLITS:
        train: 'train'
        val: 'valid'
        test: 'test'
      MIMI_SPLITS:
        train: 'ami_train_ut'
        val: 'ami_val_ut'
        test: 'ami_test_ut'
      MIMI_STEM_PREFIX: ''
      LENGTH_TOLERANCE: 2
    # - NAME: 'candor_bc'
    #   DATA_ROOT: '/home6/duplex/dataset/candor_flame/bc'
    #   MIMI_ROOT: '/home6/duplex/dataset/mimi_emb/candor_bc'
