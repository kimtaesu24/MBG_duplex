MODEL:
  NAME: 'ARTalkCodecMimi54'
  LOADER: 'artalk_codec.ARTalkCodec'
  MOTION_DIM: 54
  V_CODE_DIM: 32
  V_PATCH_NUMS: [1, 10, 20, 50, 100]
  T_DEPTH: 8
  T_NUM_HEADS: 8
  T_HIDDEN_DIM: 512
  STATS_PATH: '/home6/duplex/dataset/artalk_mimi54_stats.json'

TRAINER:
  BATCH_SIZE: 128
  TRAIN_ITER: 200000
  CHECK_INTERVAL: 50000
  NAME: 'Adam'
  WARMUP_ITER: 1000
  LR_DECAY_RATE: 0.1
  LR_DECAY_ITER: 200000
  LEARNING_RATE: 1.0e-4
  USING_EMA: True
  EMA_DECAY: 0.9999
  EMA_UPDATE_FREQ: 1

LOSS_KWARGS:
  VQ_WEIGHT: 1.0
  EXP_WEIGHT: 1.0
  POSE_WEIGHT: 8.0
  HEAD_VEL_WEIGHT: 5.0
  HEAD_SMOOTH_WEIGHT: 0.5
  MESH_WEIGHT: 0.0
  LIPS_WEIGHT: 0.0
  MESH_VEL_WEIGHT: 0.0
  MESH_SMOOTH_WEIGHT: 0.0
