<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#27313f"/>
    </marker>
    <linearGradient id="audioGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DDF2F1"/>
      <stop offset="1" stop-color="#B7E3DD"/>
    </linearGradient>
    <linearGradient id="motionGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7E5C3"/>
      <stop offset="1" stop-color="#E9C47B"/>
    </linearGradient>
    <linearGradient id="gateGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E9E3FF"/>
      <stop offset="1" stop-color="#C7B8F2"/>
    </linearGradient>
    <linearGradient id="outGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D7EDF9"/>
      <stop offset="1" stop-color="#95C8E8"/>
    </linearGradient>
    <style>
      .bg { fill: #fbfbf8; }
      .panel { fill: #ffffff; stroke: #c9d0d8; stroke-width: 2; }
      .box { stroke: #27313f; stroke-width: 2; rx: 10; ry: 10; }
      .thin { stroke: #27313f; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #6b7380; stroke-width: 2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #17202b; }
      .section { font: 700 24px Arial, Helvetica, sans-serif; fill: #27313f; }
      .label { font: 700 20px Arial, Helvetica, sans-serif; fill: #17202b; }
      .small { font: 16px Arial, Helvetica, sans-serif; fill: #334155; }
      .tiny { font: 14px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .math { font: 700 18px Arial, Helvetica, sans-serif; fill: #17202b; }
      .caption { font: 18px Arial, Helvetica, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="980"/>
  <text class="title" x="80" y="70">SoftVQ-Supervised Continuous Online Facial Motion Generator</text>
  <text class="caption" x="80" y="105">Causal autoregressive inference from streaming Mimi / language features to continuous FLAME motion.</text>

  <rect class="panel" x="55" y="135" width="520" height="720" rx="18"/>
  <text class="section" x="85" y="180">Streaming Inputs</text>

  <rect class="box" x="95" y="225" width="390" height="95" fill="url(#audioGrad)"/>
  <text class="label" x="125" y="263">Mimi audio features</text>
  <text class="small" x="125" y="292">12.5 Hz tokens/features</text>

  <rect class="box" x="95" y="365" width="390" height="95" fill="#E6F4D9"/>
  <text class="label" x="125" y="403">Language features</text>
  <text class="small" x="125" y="432">LLM token stream / feature slots</text>

  <rect class="box" x="95" y="585" width="390" height="100" fill="url(#motionGrad)"/>
  <text class="label" x="125" y="623">Previous motion</text>
  <text class="small" x="125" y="652">train: shifted GT</text>
  <text class="small" x="125" y="676">infer: previous prediction</text>

  <rect class="box" x="95" y="735" width="390" height="75" fill="#F2F4F7"/>
  <text class="label" x="125" y="780">Causal mask + time position</text>

  <rect class="panel" x="625" y="135" width="560" height="720" rx="18"/>
  <text class="section" x="655" y="180">Causal Encoders</text>

  <rect class="box" x="675" y="225" width="210" height="75" fill="url(#audioGrad)"/>
  <text class="label" x="705" y="256">audio proj</text>
  <text class="tiny" x="705" y="281">512 to hidden</text>

  <rect class="box" x="675" y="365" width="210" height="75" fill="#E6F4D9"/>
  <text class="label" x="705" y="396">LLM proj</text>
  <text class="tiny" x="705" y="421">4096 to hidden</text>

  <rect class="box" x="935" y="285" width="205" height="95" fill="#F2F4F7"/>
  <text class="label" x="960" y="323">sum + pos</text>
  <text class="tiny" x="960" y="350">audio, language,</text>
  <text class="tiny" x="960" y="370">position, phase</text>

  <rect class="box" x="815" y="450" width="270" height="100" fill="url(#audioGrad)"/>
  <text class="label" x="845" y="488">Causal audio encoder</text>
  <text class="small" x="845" y="518">Transformer layers</text>

  <rect class="box" x="695" y="620" width="260" height="90" fill="url(#motionGrad)"/>
  <text class="label" x="725" y="657">motion proj</text>
  <text class="tiny" x="725" y="683">concat previous motion</text>
  <text class="tiny" x="725" y="702">with audio hidden</text>

  <rect class="box" x="985" y="620" width="165" height="90" fill="url(#motionGrad)"/>
  <text class="label" x="1015" y="657">Causal</text>
  <text class="label" x="1015" y="683">motion</text>
  <text class="label" x="1015" y="709">encoder</text>

  <line class="thin" x1="485" y1="272" x2="675" y2="262"/>
  <line class="thin" x1="485" y1="413" x2="675" y2="402"/>
  <line class="thin" x1="885" y1="262" x2="935" y2="317"/>
  <line class="thin" x1="885" y1="402" x2="935" y2="344"/>
  <line class="thin" x1="1038" y1="380" x2="970" y2="450"/>
  <line class="thin" x1="950" y1="550" x2="825" y2="620"/>
  <line class="thin" x1="485" y1="635" x2="695" y2="665"/>
  <line class="thin" x1="955" y1="665" x2="985" y2="665"/>
  <line class="dash" x1="292" y1="735" x2="935" y2="500"/>
  <line class="dash" x1="292" y1="735" x2="1068" y2="620"/>

  <rect class="panel" x="1235" y="135" width="510" height="720" rx="18"/>
  <text class="section" x="1265" y="180">Continuous Motion Head</text>

  <rect class="box" x="1280" y="230" width="180" height="85" fill="#EAF6FF"/>
  <text class="label" x="1310" y="265">prior head</text>
  <text class="tiny" x="1310" y="292">54D prior</text>

  <rect class="box" x="1510" y="230" width="180" height="85" fill="#F7E5C3"/>
  <text class="label" x="1540" y="265">z head</text>
  <text class="tiny" x="1540" y="292">SoftVQ loss only</text>

  <rect class="box" x="1280" y="380" width="180" height="85" fill="#F4D6C8"/>
  <text class="label" x="1310" y="413">delta head</text>
  <text class="tiny" x="1310" y="440">prev + delta</text>

  <rect class="box" x="1510" y="380" width="180" height="85" fill="#F4D6C8"/>
  <text class="label" x="1540" y="413">residual</text>
  <text class="tiny" x="1540" y="440">scaled update</text>

  <rect class="box" x="1280" y="535" width="410" height="105" fill="url(#gateGrad)"/>
  <text class="label" x="1310" y="574">group-wise gate</text>
  <text class="small" x="1310" y="604">expression / jaw / neck</text>
  <text class="tiny" x="1310" y="626">blend prior with autoregressive candidate</text>

  <rect class="box" x="1280" y="705" width="410" height="85" fill="url(#outGrad)"/>
  <text class="label" x="1310" y="738">continuous FLAME motion</text>
  <text class="small" x="1310" y="768">54D per frame, autoregressive rollout</text>

  <line class="thin" x1="1085" y1="500" x2="1280" y2="272"/>
  <line class="thin" x1="1085" y1="500" x2="1510" y2="272"/>
  <line class="thin" x1="1150" y1="665" x2="1280" y2="422"/>
  <line class="thin" x1="1150" y1="665" x2="1510" y2="422"/>
  <line class="thin" x1="1460" y1="272" x2="1380" y2="535"/>
  <line class="thin" x1="1460" y1="422" x2="1435" y2="535"/>
  <line class="thin" x1="1510" y1="422" x2="1540" y2="535"/>
  <line class="thin" x1="1485" y1="640" x2="1485" y2="705"/>
  <line class="thin" x1="1600" y1="465" x2="1600" y2="705"/>

  <text class="math" x="1290" y="680">motion = gate * candidate + (1 - gate) * prior + residual</text>

  <rect x="685" y="875" width="430" height="52" rx="10" fill="#fff" stroke="#c9d0d8" stroke-width="2"/>
  <text class="caption" x="715" y="908">Inference is AR: generated frame feeds the next step.</text>
  <path d="M1600 790 C1600 930, 760 945, 290 685" stroke="#6b7380" stroke-width="3" stroke-dasharray="9 8" fill="none" marker-end="url(#arrow)"/>
</svg>
